name: medscan_app
description: "Medical Report Digitization - OCR-powered medical report scanning and data extraction"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  http: ^1.6.0
  shimmer: ^3.0.0
  animate_do: ^3.3.4
  intl: ^0.19.0
  shared_preferences: ^2.3.4
  fl_chart: ^1.2.0
  flutter_markdown: ^0.7.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "../Icon.png"
